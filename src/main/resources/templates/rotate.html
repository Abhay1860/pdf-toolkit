<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rotate PDF</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>PDF Toolkit</header>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">Rotate PDF</h3>

        <p class="text-muted text-center">
            Rotate all pages by a selected angle.
        </p>

        <form action="/rotate" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Choose PDF</label>
                <input class="form-control" type="file" name="file" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Rotation Angle</label>
                <select class="form-select" name="angle">
                    <option value="90">90°</option>
                    <option value="180">180°</option>
                    <option value="270">270°</option>
                </select>
            </div>

            <button class="btn btn-success w-100" type="submit">
                Rotate PDF
            </button>
        </form>

    </div>
</div>

<footer>© PDF Toolkit</footer>

</body>
</html>
