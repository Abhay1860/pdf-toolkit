<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lock PDF</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>PDF Toolkit</header>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">Lock PDF</h3>

        <p class="text-muted text-center">
            Protect your PDF with a password.
        </p>

        <form action="/lock" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Choose PDF</label>
                <input class="form-control" type="file" name="file" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>

            <button class="btn btn-danger w-100" type="submit">
                Lock PDF
            </button>
        </form>

    </div>
</div>

<footer>© PDF Toolkit</footer>

</body>
</html>
