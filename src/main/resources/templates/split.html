<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Split PDF</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>PDF Toolkit</header>

<div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">Split PDF</h3>

        <p class="text-muted text-center">
            Upload a PDF and specify page ranges (e.g., 1-3,4-6).
            The result will be a ZIP containing split files.
        </p>

        <form action="/split" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Choose PDF</label>
                <input class="form-control" type="file" name="file" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Page Ranges</label>
                <input type="text" class="form-control" name="ranges"
                       placeholder="e.g. 1-3,4-6" required>
            </div>

            <button class="btn btn-primary w-100" type="submit">
                Split PDF
            </button>
        </form>

    </div>
</div>

<footer>© PDF Toolkit</footer>

</body>
</html>
