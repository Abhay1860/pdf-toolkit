<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reorder PDF</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>PDF Toolkit</header>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card p-4 shadow" style="width: 420px;">

        <h3 class="text-center mb-3">Reorder PDF</h3>

        <p class="text-muted text-center">
            Enter page numbers in desired order (e.g., 3,1,2).
        </p>

        <form action="/reorder" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Choose PDF</label>
                <input class="form-control" type="file" name="file" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Page Order</label>
                <input type="text" class="form-control" name="order"
                       placeholder="e.g. 3,1,2,4" required>
            </div>

            <button class="btn btn-primary w-100" type="submit">
                Reorder PDF
            </button>
        </form>

    </div>
</div>

<footer>© PDF Toolkit</footer>

</body>
</html>
