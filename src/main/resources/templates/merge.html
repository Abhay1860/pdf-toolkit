<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Merge PDF</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>PDF Toolkit</header>

<div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">Merge PDFs</h3>

        <p class="text-muted text-center">
            Upload multiple PDF files to combine them into a single document.
        </p>

        <form action="/merge" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Choose PDFs</label>
                <input class="form-control" type="file" name="files" multiple required>
            </div>

            <button class="btn btn-success w-100" type="submit">
                Merge PDFs
            </button>
        </form>

    </div>
</div>

<footer>© PDF Toolkit</footer>

</body>
</html>
